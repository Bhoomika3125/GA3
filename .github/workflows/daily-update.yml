name: Daily Update by 25ds3000152@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 2:30 AM UTC
  workflow_dispatch:  # Lets you test manually
  
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update status file by 25ds3000152@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date)" > STATUS.md

      - name: Commit changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "25ds3000152@ds.study.iitm.ac.in"
          git add STATUS.md
          git commit -m "Daily automated update - $(date)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

